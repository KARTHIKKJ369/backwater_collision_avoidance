services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: backwater-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backwater-backend
    depends_on:
      - mqtt
    environment:
      MQTT_HOST: ${MQTT_HOST:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      SQLITE_PATH: /app/backend/data/boats.db
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/backend/data

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    container_name: backwater-simulator
    depends_on:
      - mqtt
      - backend
    environment:
      MQTT_HOST: ${MQTT_HOST:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
    profiles:
      - dev                         # only starts with: docker compose --profile dev up

  # Uncomment when LoRa gateway is ready (Pi deployment)
  # lora_gateway:
  #   build:
  #     context: .
  #     dockerfile: firmware/lora_gateway/Dockerfile
  #   container_name: backwater-lora-gw
  #   depends_on: [mqtt]
  #   network_mode: host
  #   devices:
  #     - /dev/spidev0.0:/dev/spidev0.0
  #   environment:
  #     MQTT_HOST: localhost
  #     MQTT_PORT: 1883

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: backwater-dashboard
    depends_on:
      - backend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "8080:8080"

volumes:
  backend-data:
